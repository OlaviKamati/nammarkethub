<svg width="180" height="36" viewBox="0 0 180 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C96A"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9A7A2E"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9A7A2E"/>
    </linearGradient>
  </defs>

  <!-- Icon: stylized N diamond with map pin dot -->
  <g transform="translate(0, 2)">
    <!-- Outer diamond -->
    <path d="M16 0 L30 8 L30 24 L16 32 L2 24 L2 8 Z" fill="url(#goldGrad)" opacity="0.15"/>
    <!-- Inner diamond border -->
    <path d="M16 2 L28 9 L28 23 L16 30 L4 23 L4 9 Z" stroke="url(#goldGrad)" stroke-width="1" fill="none"/>
    <!-- N letterform inside diamond -->
    <path d="M9 22 L9 10 L14 10 L22 19 L22 10 L24 10 L24 22 L19 22 L11 13 L11 22 Z" fill="url(#goldGrad)"/>
    <!-- Map pin dot (top right of diamond) -->
    <circle cx="27" cy="6" r="3" fill="url(#goldGrad)"/>
    <path d="M27 9 L27 12" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="40" y="24" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif" font-size="17" font-weight="700" letter-spacing="-0.3" fill="url(#goldGrad)">Nam</text>
  <text x="76" y="24" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif" font-size="17" font-weight="400" letter-spacing="-0.3" fill="#FAFAF8">Market</text>
  <text x="134" y="24" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif" font-size="17" font-weight="700" letter-spacing="-0.3" fill="url(#goldGrad)">Hub</text>

  <!-- Tagline -->
  <text x="40" y="34" font-family="ui-monospace, 'SF Mono', monospace" font-size="6.5" letter-spacing="0.12em" fill="#9A7A2E" text-transform="uppercase">NAMIBIA'S MARKETPLACE</text>
</svg>
